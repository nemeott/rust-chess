# Not respected by maturin?
[build]
rustflags = [
    "-C", "target-cpu=native", # Gain access to CPU popcnt and ctzl (recommended by chess crate)
]

# Maturin does respect this though
[target.'cfg(target_os = "linux")']
rustflags = [
    "-C", "target-cpu=native", # Gain access to CPU popcnt and ctzl (recommended by chess crate)
    "-C", "link-arg=-fuse-ld=mold"
]
