# Native x86_64 Linux
[target.x86_64-unknown-linux-gnu]
rustflags = [
    # "-C", "target-cpu=native", # Gain access to CPU popcnt and ctzl (recommended by chess crate)
    "-C", "target-feature=+popcnt",
]

# Native x86_64 macOS
[target.x86_64-apple-darwin]
rustflags = [
    # "-C", "target-cpu=native", # Gain access to CPU popcnt and ctzl (recommended by chess crate)
    "-C", "target-feature=+popcnt",
]

# Native aarch64 macOS (M1/M2/M3)
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native", # Gain access to CPU popcnt and ctzl (recommended by chess crate)
]

# Cross-compile targets - generic CPU, no native linker flags
[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=generic",
]

[target.x86-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=generic",
]
